<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Tickets - Sorteio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 500px; width: 100%; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .sub { color: #666; margin: 0 0 4px; }
    .sub-small { font-size: 13px; color: #888; font-style: italic; margin-bottom: 20px; }
    .fields { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .field { text-align: left; }
    .field label { font-size: 13px; font-weight: bold; color: #333; display: block; margin-bottom: 4px; }
    .field input { width: 130px; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
    button { background: #0066cc; color: #fff; border: none; border-radius: 8px; padding: 14px 40px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; padding: 10px 16px; border-radius: 8px; }
    .msg.ok { background: #e8f5e9; color: #2e7d32; }
    .msg.erro { background: #ffebee; color: #c62828; }
    .msg.info { background: #f5f5f5; color: #555; }
    .info-text { font-size: 12px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size: 40px; margin-bottom: 12px;">🎫</div>
    <h1>Gerador de Tickets para Sorteio</h1>
    <p class="sub">Secretaria Municipal de Esporte - Arapongas/PR</p>
    <p class="sub-small">Sorteio de Brindes</p>

    <div class="fields">
      <div class="field">
        <label>Nº Inicial</label>
        <input type="number" id="start" min="1" max="15000" value="1">
      </div>
      <div class="field">
        <label>Nº Final</label>
        <input type="number" id="end" min="1" max="15000" value="100">
      </div>
    </div>

    <button id="gerarBtn" onclick="gerarPDF()">📄 Gerar PDF</button>
    <div id="mensagem" class="msg info" style="display: none;"></div>

    <div class="info-text">
      ⚠️ Lotes de até 2000 ingressos (tempo limite).<br>
      Layout: 3 cm altura × 10 cm largura (canhoto 5 cm + parte principal 5 cm).<br>
      2 ingressos por linha × 9 linhas = 18 ingressos por folha A4.
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    async function gerarPDF() {
      const btn = document.getElementById('gerarBtn');
      const msg = document.getElementById('mensagem');
      btn.disabled = true;
      msg.style.display = 'block';
      msg.className = 'msg info';
      msg.textContent = 'Gerando PDF...';

      const start = Math.max(1, Math.min(parseInt(document.getElementById('start').value) || 1, 15000));
      const end = Math.min(15000, Math.max(parseInt(document.getElementById('end').value) || 100, start));
      const maxPorLote = 2000;
      const adjustedEnd = Math.min(end, start + maxPorLote - 1);

      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      // Dimensões do ticket
      const ticketHeight = 30;      // 3 cm
      const ticketWidth = 100;      // 10 cm
      const lado = 50;              // metade (5 cm) para canhoto e parte principal

      const colunas = 2;            // 2 ingressos por linha
      const linhas = 9;             // 9 linhas de 3 cm = 27 cm (cabe na A4)
      const espacoColunas = 5;      // mm entre as duas colunas
      const totalLargura = colunas * ticketWidth + (colunas - 1) * espacoColunas;
      const marginLeft = (210 - totalLargura) / 2;
      const marginTop = (297 - linhas * ticketHeight) / 2;

      let current = start;
      let firstPage = true;

      try {
        // Carrega imagem da logo (opcional)
        let logoImg = null;
        try {
          const resp = await fetch('logo.png');
          if (resp.ok) {
            const blob = await resp.blob();
            logoImg = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
          }
        } catch (e) { /* sem imagem */ }

        while (current <= adjustedEnd) {
          if (!firstPage) doc.addPage();
          firstPage = false;

          for (let row = 0; row < linhas && current <= adjustedEnd; row++) {
            for (let col = 0; col < colunas && current <= adjustedEnd; col++) {
              const x = marginLeft + col * (ticketWidth + espacoColunas);
              const y = marginTop + row * ticketHeight;
              const numStr = String(current).padStart(4, '0');

              // ---- CANHOTO (esquerda, 5 cm) ----
              doc.setDrawColor(204);
              doc.setLineWidth(0.1);
              doc.rect(x, y, lado, ticketHeight);

              // Logomarca visual (tamanho 8 mm)
              const logoSize = 8;
              desenharLogo(doc, logoImg, x + (lado - logoSize) / 2, y + 2, logoSize);

              // Número grande centralizado
              const fontSizeNum = 10;
              doc.setFontSize(fontSizeNum);
              doc.setFont('helvetica', 'bold');
              doc.setTextColor(0);
              doc.text(numStr, x + lado / 2, y + logoSize + 13, { align: 'center' });

              // ---- LINHA DE CORTE VERTICAL (tracejada) ----
              const dashX = x + lado; // exatamente no meio (após 5 cm)
              doc.setDrawColor(0);
              doc.setLineWidth(0.2);
              doc.setLineDash([1.5, 1.5], 0);
              doc.line(dashX, y + 2, dashX, y + ticketHeight - 2);
              doc.setLineDash([]);
              // Tesoura
              doc.setFontSize(4);
              doc.setTextColor(136);
              doc.text('✂', dashX - 2, y + 4, { align: 'center' });

              // ---- PARTE PRINCIPAL (direita, 5 cm) ----
              const px = x + lado + 0.5; // pequena folga para a linha de corte
              doc.setDrawColor(204);
              doc.setLineWidth(0.1);
              doc.rect(px, y, lado - 0.5, ticketHeight);

              // Mesma logomarca
              desenharLogo(doc, logoImg, px + (lado - 0.5 - logoSize) / 2, y + 2, logoSize);

              // Número grande (com "Nº")
              doc.setFontSize(fontSizeNum);
              doc.setFont('helvetica', 'bold');
              doc.setTextColor(0);
              doc.text(`Nº ${numStr}`, px + (lado - 0.5) / 2, y + logoSize + 13, { align: 'center' });

              current++;
            }
          }
        }

        const filename = `tickets-${String(start).padStart(4,'0')}-${String(adjustedEnd).padStart(4,'0')}.pdf`;
        doc.save(filename);

        const paginas = Math.ceil((adjustedEnd - start + 1) / (linhas * colunas));
        msg.className = 'msg ok';
        msg.textContent = `✅ PDF gerado! ${adjustedEnd - start + 1} ingressos em ${paginas} página(s).`;
      } catch (erro) {
        msg.className = 'msg erro';
        msg.textContent = '❌ Erro: ' + erro.message;
      } finally {
        btn.disabled = false;
      }
    }

    /**
     * Desenha a logomarca (apenas visual):
     * - Se existir 'logo.png', usa a imagem.
     * - Caso contrário, desenha um selo azul com a letra "A".
     */
    function desenharLogo(doc, img, x, y, size) {
      if (img) {
        doc.addImage(img, 'PNG', x, y, size, size);
      } else {
        // Selo azul com "A" (representa a identidade visual)
        doc.setFillColor(0, 51, 102);
        doc.rect(x, y, size, size, 'F');
        doc.setFontSize(size * 0.6);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(255, 255, 255);
        doc.text('A', x + size/2, y + size/2 + size*0.2, { align: 'center' });
      }
    }
  </script>
</body>
</html>
