<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Universal de Ingressos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 520px; width: 100%; text-align: center; }
        h1 { font-size: 22px; margin-bottom: 6px; }
        .sub { color: #666; font-size: 14px; margin: 4px 0; }
        .section { margin: 16px 0 8px; font-weight: bold; font-size: 14px; }
        .fields { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        .field { text-align: left; }
        .field label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }
        .field input, .field select { padding: 10px; font-size: 14px; border: 2px solid #ddd; border-radius: 8px; }
        .field input[type="text"] { width: 200px; }
        .field input[type="number"] { width: 100px; text-align: center; }
        .file-upload { margin: 10px 0; }
        #preview { max-width: 80px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; display: none; }
        button { background: #0066cc; color: white; border: none; border-radius: 8px; padding: 14px 40px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 16px; }
        button:disabled { background: #999; }
        .msg { margin-top: 16px; padding: 10px; border-radius: 8px; font-size: 13px; }
        .msg.ok { background: #e8f5e9; color: #2e7d32; }
        .msg.erro { background: #ffebee; color: #c62828; }
        .msg.info { background: #f5f5f5; color: #555; }
        .info-text { font-size: 12px; color: #888; margin-top: 20px; }
        .range-wrap { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
<div class="card">
    <div style="font-size: 40px;">🎫</div>
    <h1>Gerador Universal de Ingressos</h1>
    <p class="sub">Secretaria Municipal de Esporte - Arapongas/PR</p>
    <p class="sub">Sorteio de Brindes / Eventos</p>

    <div class="section">Modo</div>
    <select id="modo" onchange="alternarModo()">
        <option value="sorteio">🎟️ Sorteio (canhoto + numeração)</option>
        <option value="convite">🎵 Convite / Show (sem canhoto)</option>
    </select>

    <div class="section">Logo (opcional)</div>
    <input type="file" id="logoInput" accept="image/*"><br>
    <img id="preview" alt="Pré-visualização">

    <div class="section">Textos do Ingresso</div>
    <input type="text" id="linha1" value="TORNEIO 1º DE MAIO" placeholder="Linha 1"><br><br>
    <input type="text" id="linha2" value="2026" placeholder="Linha 2"><br><br>
    <input type="text" id="linha3" value="" placeholder="Linha 3 (opcional)"><br>

    <div class="section">Marca d'água</div>
    <input type="text" id="wmTexto" value="SEC. ESPORTE ARAPONGAS/PR" placeholder="Texto da marca">
    <div class="range-wrap">
        <label>Opacidade:</label>
        <input type="range" id="wmOpac" min="0.1" max="0.5" step="0.05" value="0.3">
        <span id="wmVal">0.30</span>
    </div>

    <div class="section">Quantidade</div>
    <span id="campoInicial" style="display:none">
        <label>Nº Inicial:</label>
        <input type="number" id="start" value="1" min="1" max="15000">
    </span>
    <label>Quantidade:</label>
    <input type="number" id="qtd" value="18" min="1" max="2000">

    <button id="gerar" onclick="gerarPDF()">📄 Gerar e Visualizar PDF</button>
    <div id="mensagem" class="msg" style="display:none"></div>
    <div class="info-text">⚠ Lotes de até 2000. Marca d'água única e paralela.</div>
</div>

<script>
    const { jsPDF } = window.jspdf;

    document.getElementById('wmOpac').addEventListener('input', function() {
        document.getElementById('wmVal').textContent = parseFloat(this.value).toFixed(2);
    });

    document.getElementById('logoInput').addEventListener('change', function(e) {
        const f = e.target.files[0];
        const p = document.getElementById('preview');
        if (f) {
            const r = new FileReader();
            r.onload = ev => { p.src = ev.target.result; p.style.display = 'block'; };
            r.readAsDataURL(f);
        } else p.style.display = 'none';
    });

    function alternarModo() {
        document.getElementById('campoInicial').style.display = 
            document.getElementById('modo').value === 'sorteio' ? 'inline' : 'none';
    }
    alternarModo();

    async function gerarPDF() {
        const btn = document.getElementById('gerar');
        btn.disabled = true;
        const msg = document.getElementById('mensagem');
        msg.style.display = 'block';
        msg.className = 'msg.info';
        msg.textContent = 'Gerando...';

        try {
            const modo = document.getElementById('modo').value;
            const l1 = document.getElementById('linha1').value.trim() || 'EVENTO';
            const l2 = document.getElementById('linha2').value.trim();
            const l3 = document.getElementById('linha3').value.trim();
            const wmTexto = document.getElementById('wmTexto').value.trim() || 'MARCA D\'AGUA';
            const opac = parseFloat(document.getElementById('wmOpac').value);
            const qtd = Math.min(2000, parseInt(document.getElementById('qtd').value) || 18);
            let startNum = 1;
            if (modo === 'sorteio') startNum = Math.max(1, parseInt(document.getElementById('start').value) || 1);

            let logoImg = null;
            const file = document.getElementById('logoInput').files[0];
            if (file) {
                logoImg = await new Promise(res => {
                    const r = new FileReader();
                    r.onload = () => res(r.result);
                    r.readAsDataURL(file);
                });
            }

            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const h = 30, w = 100, lado = 50, cols = 2, rows = 9, gap = 5;
            const totalW = cols * w + (cols-1) * gap;
            const ml = (210 - totalW) / 2, mt = (297 - rows * h) / 2;
            const fontSizeT = 7, fontSizeN = 11, margB = 5;

            let count = 0, current = startNum, firstPage = true;

            while (count < qtd) {
                if (!firstPage) doc.addPage();
                firstPage = false;
                for (let r = 0; r < rows && count < qtd; r++) {
                    for (let c = 0; c < cols && count < qtd; c++) {
                        const x = ml + c * (w + gap);
                        const y = mt + r * h;
                        let num = '';
                        if (modo === 'sorteio') {
                            num = `N\u00BA ${String(current).padStart(4,'0')}`;
                            current++;
                        }
                        // Marca d'água única (apenas uma linha paralela centralizada)
                        desenharMarcaDaguaUnica(doc, wmTexto, x, y, w, h, opac);

                        if (modo === 'sorteio') {
                            doc.rect(x, y, lado, h);
                            desenharConteudo(doc, x, y, lado, h, l1, l2, l3, num, logoImg, fontSizeT, fontSizeN, margB);
                            doc.setLineDash([1.5,1.5]); doc.line(x+lado, y+2, x+lado, y+h-2); doc.setLineDash([]);
                            doc.text('✂', x+lado-2, y+4, { align: 'center' });
                            doc.rect(x+lado+0.5, y, lado-0.5, h);
                            desenharConteudo(doc, x+lado+0.5, y, lado, h, l1, l2, l3, num, logoImg, fontSizeT, fontSizeN, margB);
                        } else {
                            doc.rect(x, y, w, h);
                            desenharConteudo(doc, x, y, w, h, l1, l2, l3, '', logoImg, fontSizeT, fontSizeN, margB);
                        }
                        count++;
                    }
                }
            }

            const blob = doc.output('bloburl');
            window.open(blob, '_blank');
            msg.className = 'msg.ok';
            msg.textContent = `✅ ${count} ingresso(s) gerados.`;
        } catch(e) {
            msg.className = 'msg.erro';
            msg.textContent = '❌ Erro: ' + e.message;
        } finally {
            btn.disabled = false;
        }
    }

    // Marca d'água única e centralizada (sem repetir)
    function desenharMarcaDaguaUnica(doc, texto, x, y, w, h, opac) {
        doc.saveGraphicsState();
        doc.setGState(new doc.GState({ opacity: opac }));
        doc.setTextColor(140,140,140);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        const cx = x + w/2;
        const cy = y + h/2;
        doc.text(texto, cx, cy, { align: 'center', angle: 30, renderingMode: 'fill' });
        doc.restoreGraphicsState();
    }

    function desenharConteudo(doc, x, y, lw, h, l1, l2, l3, num, logo, fsT, fsN, margB) {
        const numY = y + h - margB;
        const linhas = [l1]; if(l2) linhas.push(l2); if(l3) linhas.push(l3);
        const altLinha = fsT * 1.2;
        const blocoH = altLinha * linhas.length + (linhas.length-1)*1;
        const espaco = num ? (numY - y - fsN*0.5) : (numY - y + fsN);
        const textoY = y + (espaco - blocoH)/2 + altLinha;
        let cx, txLargura;
        if (logo) {
            const logoSize = 12; doc.addImage(logo, 'PNG', x+2, y+(h-logoSize)/2, logoSize, logoSize);
            const tx = x+2+logoSize+2;
            txLargura = lw - logoSize - 6;
            cx = tx + txLargura/2;
        } else {
            cx = x + lw/2;
            txLargura = lw - 4;
        }
        doc.setFontSize(fsT); doc.setFont('helvetica', 'bold'); doc.setTextColor(0);
        linhas.forEach((li, i) => doc.text(li, cx, textoY + i*(altLinha+1), { align: 'center', maxWidth: txLargura }));
        if (num) {
            doc.setFontSize(fsN); doc.text(num, cx, numY, { align: 'center', maxWidth: txLargura });
        }
    }
</script>
</body>
</html>
