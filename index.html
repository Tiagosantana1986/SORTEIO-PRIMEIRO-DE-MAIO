<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Tickets - Sorteio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 500px; width: 100%; text-align: center; }
    h1 { font-size: 24px; margin-bottom: 6px; }
    .sub { color: #666; margin: 0 0 4px; }
    .sub-small { font-size: 13px; color: #888; font-style: italic; margin-bottom: 24px; }
    .fields { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .field { text-align: left; }
    .field label { font-size: 13px; font-weight: bold; color: #333; display: block; margin-bottom: 4px; }
    .field input { width: 130px; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
    button { background: #0066cc; color: #fff; border: none; border-radius: 8px; padding: 14px 40px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; padding: 10px 16px; border-radius: 8px; }
    .msg.ok { background: #e8f5e9; color: #2e7d32; }
    .msg.erro { background: #ffebee; color: #c62828; }
    .msg.info { background: #f5f5f5; color: #555; }
    code { background: #eee; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size: 40px; margin-bottom: 12px;">🎫</div>
    <h1>Gerador de Tickets para Sorteio</h1>
    <p class="sub">Secretaria Municipal de Esporte - Arapongas/PR</p>
    <p class="sub-small">Sorteio de Brindes</p>

    <div class="fields">
      <div class="field">
        <label>Nº Inicial</label>
        <input type="number" id="start" min="1" max="15000" value="1">
      </div>
      <div class="field">
        <label>Nº Final</label>
        <input type="number" id="end" min="1" max="15000" value="100">
      </div>
    </div>

    <button id="gerarBtn" onclick="gerarPDF()">📄 Gerar PDF</button>
    <div id="mensagem" class="msg info" style="display: none;"></div>

    <p style="font-size: 12px; color: #888; margin-top: 24px;">
      ⚠️ Para evitar travamentos, recomenda-se lotes de até 2000 ingressos por vez.<br>
      Substitua <code>logo.png</code> na raiz do projeto se quiser usar uma imagem real.
    </p>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    async function gerarPDF() {
      const btn = document.getElementById('gerarBtn');
      const msg = document.getElementById('mensagem');
      btn.disabled = true;
      msg.style.display = 'block';
      msg.className = 'msg info';
      msg.textContent = 'Gerando PDF...';

      const start = Math.max(1, Math.min(parseInt(document.getElementById('start').value) || 1, 15000));
      const end = Math.min(15000, Math.max(parseInt(document.getElementById('end').value) || 100, start));
      const maxPorLote = 2000;
      const adjustedEnd = Math.min(end, start + maxPorLote - 1);

      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageWidth = 210;        // mm
      const pageHeight = 297;       // mm
      const marginLeft = 4.2;       // mm (≈12pt)
      const marginTop = 5.3;        // mm (≈15pt)
      const canhotoWidth = 38.7;    // mm (≈110pt)
      const gap = 2.1;             // mm (≈6pt)
      const principalWidth = pageWidth - marginLeft * 2 - canhotoWidth - gap;
      const ticketHeight = 6.35;    // mm (≈18pt)
      const ticketsPerPage = Math.floor((pageHeight - marginTop * 2) / ticketHeight);

      let current = start;
      let ticketIdx = 0;
      let firstPage = true;

      try {
        // Tenta carregar imagem logo.png (se existir na mesma pasta)
        let logoImg = null;
        try {
          const resp = await fetch('logo.png');
          if (resp.ok) {
            const blob = await resp.blob();
            logoImg = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
          }
        } catch (e) { /* sem logo */ }

        while (current <= adjustedEnd) {
          if (!firstPage) doc.addPage();
          firstPage = false;

          for (let i = 0; i < ticketsPerPage && current <= adjustedEnd; i++, current++, ticketIdx++) {
            const y = marginTop + i * ticketHeight;
            const numStr = String(current).padStart(4, '0');

            // ---- CANHOTO ----
            const canhotoX = marginLeft;
            // Retângulo
            doc.setDrawColor(204);
            doc.setLineWidth(0.1);
            doc.rect(canhotoX, y, canhotoWidth, ticketHeight);

            // Logo ou identidade visual
            desenharLogo(doc, logoImg, canhotoX + 0.7, y + 0.35, 3.53); // ≈10pt

            // Número
            doc.setFontSize(7);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(0);
            doc.text(numStr, canhotoX + 4.5, y + 1.7, { align: 'left' });

            // Texto resumido
            doc.setFontSize(3.8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(51);
            doc.text('Sec. Mun. Esporte - Arapongas/PR - Sorteio Brindes', canhotoX + 15, y + 2.1, { align: 'left' });

            // ---- LINHA DE CORTE VERTICAL ----
            const dashX = canhotoX + canhotoWidth + gap / 2;
            doc.setDrawColor(0);
            doc.setLineWidth(0.12);
            doc.setLineDash([1, 1], 0);
            doc.line(dashX, y + 0.5, dashX, y + ticketHeight - 0.5);
            doc.setLineDash([]); // reset

            // Tesoura
            doc.setFontSize(5);
            doc.setTextColor(136);
            doc.text('✂', dashX - 2.1, y + 1.1, { align: 'center' });

            // ---- PARTE PRINCIPAL ----
            const principalX = canhotoX + canhotoWidth + gap;
            doc.setDrawColor(204);
            doc.setLineWidth(0.1);
            doc.rect(principalX, y, principalWidth, ticketHeight);

            // Logo maior
            desenharLogo(doc, logoImg, principalX + 0.7, y + 0.5, 4.23); // ≈12pt

            // Nº
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(0);
            doc.text(`Nº ${numStr}`, principalX + 5, y + 1.7, { align: 'left' });

            // Texto completo
            doc.setFontSize(4.5);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(0);
            doc.text('Secretaria Municipal de Esporte - Arapongas/PR  |  Sorteio de Brindes', principalX + 24, y + 2.1, { align: 'left' });

            // ---- LINHA DE CORTE HORIZONTAL ----
            if (i < ticketsPerPage - 1 && current < adjustedEnd) {
              doc.setDrawColor(170);
              doc.setLineWidth(0.1);
              doc.setLineDash([0.8, 0.8], 0);
              doc.line(marginLeft, y + ticketHeight, marginLeft + pageWidth - marginLeft * 2, y + ticketHeight);
              doc.setLineDash([]);
            }
          }
        }

        // Salvar PDF
        const filename = `tickets-${String(start).padStart(4,'0')}-${String(adjustedEnd).padStart(4,'0')}.pdf`;
        doc.save(filename);

        msg.className = 'msg ok';
        msg.textContent = `✅ PDF gerado com sucesso! (${adjustedEnd - start + 1} ingressos)`;
      } catch (erro) {
        msg.className = 'msg erro';
        msg.textContent = '❌ Erro: ' + erro.message;
      } finally {
        btn.disabled = false;
      }
    }

    function desenharLogo(doc, img, x, y, sizeMM) {
      if (img) {
        doc.addImage(img, 'PNG', x, y, sizeMM, sizeMM);
      } else {
        // Desenho vetorial da logomarca textual
        const s = sizeMM;
        // Fundo azul
        doc.setFillColor(0, 51, 102);
        doc.rect(x, y, s, s, 'F');
        // Faixa branca superior (30%)
        doc.setFillColor(255, 255, 255);
        doc.rect(x, y, s, s * 0.3, 'F');
        // Texto "PREFEITURA DE"
        doc.setFontSize(s * 2.5); // proporcional
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(0, 51, 102);
        doc.text('PREFEITURA DE', x + s/2, y + s*0.12, { align: 'center' });
        // "ARAPONGAS"
        doc.setFontSize(s * 3.5);
        doc.text('ARAPONGAS', x + s/2, y + s*0.26, { align: 'center' });
        // Linha amarela
        doc.setFillColor(255, 204, 0);
        doc.rect(x, y + s*0.4, s, s*0.08, 'F');
        // Slogan
        doc.setFontSize(s * 2);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(255, 255, 255);
        doc.text('NOSSA CIDADE, NOSSO COMPROMISSO.', x + s/2, y + s*0.57, { align: 'center' });
      }
    }
  </script>
</body>
</html>
